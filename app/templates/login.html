<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anmelden – {{ app_name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
      background: linear-gradient(135deg, #1c2033 0%, #0f1525 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1rem;
      background: #ffffff;
      box-shadow: 0 24px 64px rgba(0,0,0,0.40), 0 4px 16px rgba(0,0,0,0.20);
      overflow: hidden;
    }
    .login-header {
      background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 100%);
      padding: 2.25rem 2rem 2rem;
      text-align: center;
    }
    .login-header .shield-icon {
      width: 56px;
      height: 56px;
      background: rgba(255,255,255,0.15);
      border-radius: 0.875rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.75rem;
      color: #fff;
    }
    .login-header h1 {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 1.125rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.015em;
      margin: 0 0 0.25rem;
    }
    .login-header p {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.8125rem;
      color: rgba(255,255,255,0.6);
      margin: 0;
    }
    .login-body { padding: 2rem; }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-header">
    {% if app_logo %}
    <div class="shield-icon" style="background:rgba(255,255,255,0.12);padding:.5rem;">
      <img src="/{{ app_logo }}" alt="{{ app_name }}" style="max-height:40px;max-width:120px;object-fit:contain;">
    </div>
    {% else %}
    <div class="shield-icon"><i class="bi bi-shield-lock-fill"></i></div>
    {% endif %}
    <h1>{{ app_name }}</h1>
    <p>by Franz Korbjuhn</p>
  </div>

  <div class="login-body">
    {% if error %}
    <div class="alert alert-danger py-2 small mb-3">
      <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label fw-semibold">Benutzername</label>
        <div class="input-group">
          <span class="input-group-text text-muted"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="benutzername" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Passwort</label>
        <div class="input-group">
          <span class="input-group-text text-muted"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">
        <i class="bi bi-box-arrow-in-right me-1"></i>Anmelden
      </button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
