<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MFA-Verifikation – SSL Cert Management</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="min-height:100vh;">

<div class="card shadow-lg" style="width:100%;max-width:420px;">
  <div class="card-body p-4 p-md-5">

    <!-- Header -->
    <div class="text-center mb-4">
      <i class="bi bi-shield-lock-fill text-success" style="font-size:2.5rem;"></i>
      <h4 class="mt-2 fw-bold">Zwei-Faktor-Verifikation</h4>
      <p class="text-muted small mb-0">
        Angemeldet als <strong>{{ user.username }}</strong>
      </p>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 small mb-3">
      <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
    </div>
    {% endif %}

    <!-- TOTP-Formular -->
    <div id="totpSection" {% if use_recovery %}class="d-none"{% endif %}>
      <form method="post" action="/mfa/verify" id="totpForm">
        <input type="hidden" name="recovery_code" value="">
        <p class="text-muted small mb-3">
          <i class="bi bi-phone me-1"></i>
          Geben Sie den aktuellen 6-stelligen Code aus Ihrer Authenticator-App ein.
        </p>
        <div class="input-group mb-3">
          <span class="input-group-text"><i class="bi bi-123"></i></span>
          <input type="text" name="totp_code"
                 class="form-control form-control-lg font-monospace text-center"
                 placeholder="000000"
                 maxlength="6" pattern="[0-9]{6}"
                 inputmode="numeric" autocomplete="one-time-code"
                 {% if not use_recovery %}autofocus{% endif %}
                 required>
        </div>
        <button type="submit" class="btn btn-success w-100 fw-semibold mb-3">
          <i class="bi bi-check-lg me-1"></i>Bestätigen
        </button>
      </form>
      <div class="text-center">
        <button type="button" class="btn btn-link btn-sm text-muted text-decoration-none"
                onclick="switchToRecovery()">
          <i class="bi bi-key me-1"></i>Recovery Code verwenden
        </button>
      </div>
    </div>

    <!-- Recovery Code Formular -->
    <div id="recoverySection" {% if not use_recovery %}class="d-none"{% endif %}>
      <form method="post" action="/mfa/verify" id="recoveryForm">
        <input type="hidden" name="totp_code" value="">
        <p class="text-muted small mb-3">
          <i class="bi bi-key me-1"></i>
          Geben Sie einen Ihrer gespeicherten Recovery Codes ein.
          Jeder Code kann nur einmal verwendet werden.
        </p>
        <div class="input-group mb-3">
          <span class="input-group-text"><i class="bi bi-key"></i></span>
          <input type="text" name="recovery_code"
                 class="form-control font-monospace text-center"
                 placeholder="ABCD1234-EFGH5678"
                 autocomplete="off"
                 {% if use_recovery %}autofocus{% endif %}>
        </div>
        <button type="submit" class="btn btn-warning w-100 fw-semibold mb-3">
          <i class="bi bi-check-lg me-1"></i>Mit Recovery Code anmelden
        </button>
      </form>
      <div class="text-center">
        <button type="button" class="btn btn-link btn-sm text-muted text-decoration-none"
                onclick="switchToTotp()">
          <i class="bi bi-123 me-1"></i>TOTP-Code verwenden
        </button>
      </div>
    </div>

    <hr class="my-3">
    <div class="text-center">
      <a href="/logout" class="text-muted small text-decoration-none">
        <i class="bi bi-box-arrow-left me-1"></i>Abmelden
      </a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function switchToRecovery() {
  document.getElementById('totpSection').classList.add('d-none');
  document.getElementById('recoverySection').classList.remove('d-none');
  document.querySelector('[name="recovery_code"]:not([type="hidden"])').focus();
}

function switchToTotp() {
  document.getElementById('recoverySection').classList.add('d-none');
  document.getElementById('totpSection').classList.remove('d-none');
  document.querySelector('[name="totp_code"]:not([type="hidden"])').focus();
}
</script>
</body>
</html>
